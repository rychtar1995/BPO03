* { box-sizing:border-box; }
body { margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; background:linear-gradient(135deg,#0f172a,#111827); color:var(--text); }

select { background:#0b1220; color:var(--text); border:1px solid var(--border); }

.question-box { background:#0b1220; border:1px solid var(--border); border-radius:16px; padding:16px; margin:12px 0; }

.answer { text-align:left; background:#182235; color:var(--text); border:1px solid var(--border); border-radius:14px; padding:13px; display:flex; gap:10px; align-items:flex-start; }

.hidden { display:none !important; }
@media (max-width:600px) { .container{padding:10px} .card{padding:14px;border-radius:14px} .nav{flex-direction:column} button{width:100%} }

-05", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 5, "question": "<p>Jakie parametry pracy posiada rozpieracz ramieniowy o oznaczeniu AS\n40/780-15?</p>", "answers": ["<p>Minimalna siła rozpierania 4 N, minimalne rozwarcie ramion 780\nmm, masa 15 kg.</p>", "<p>Minimalna siła rozpierania 4 kN, minimalne rozwarcie ramion 78\nmm, masa 1,5 kg.</p>", "<p>Minimalna siła rozpierania 40 N, minimalne rozwarcie ramion 780\nmm, masa 15 kg.</p>", "<p>Minimalna siła rozpierania 40 kN, minimalne rozwarcie ramion 780\nmm, masa 15 kg.</p>"], "correct": "D", "globalIndex": 5}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-06", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 6, "question": "<p><img class=\"question-img\" loading=\"lazy\" src=\"assets/ms20-2018-maj-egzamin-zawodowy-pisemny_img_0004.jpeg\" style=\"width:1.92013in;height:2.0468in\"/>Urządzenie służące do\nwytwarzania i podawania piany przedstawione na rysunku, to</p>", "answers": ["<p>generator piany.</p>", "<p>agregat gaśniczy.</p>", "<p>agregat pianowy.</p>", "<p>generator gaśniczy.</p>"], "correct": "A", "globalIndex": 6}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-07", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 7, "question": "<p>Do uniesienia betonowej płyty zostały użyte dwa ratownicze\npneumatyczne siłowniki wysokociśnieniowe. Jeden z nich posiadał siłę\nunoszenia 350 kN, a drugi 290 kN. Podczas wykorzystania ich ułożenia w\nsystemie jeden na drugi (stos) maksymalna siła unoszenia tego zestawu\nwynosiła</p>", "answers": ["<p>290 kN</p>", "<p>350 kN</p>", "<p>600 kN</p>", "<p>740 kN</p>"], "correct": "A", "globalIndex": 7}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-08", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 8, "question": "<p><img class=\"question-img\" loading=\"lazy\" src=\"assets/ms20-2018-maj-egzamin-zawodowy-pisemny_img_0005.jpeg\" style=\"width:3.30694in;height:1.78013in\"/>Które urządzenie\nprzedstawiono na rysunku?</p>", "answers": ["<p>Przecinarkę tarczową do cięcia betonu.</p>", "<p>Przecinarkę tarczową do cięcia metalu.</p>", "<p>Piłę pierścieniową do cięcia betonu.</p>", "<p>Piłę pierścieniową do cięcia metalu.</p>"], "correct": "C", "globalIndex": 8}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-09", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 9, "question": "<p>W celu dobrania łańcucha do pilarki należy sprawdzić jaka jest\ndługość prowadnicy oraz</p>", "answers": ["<p>liczbę ogniw tnących i szerokość rowka prowadnicy.</p>", "<p>podziałka łańcucha i szerokość rowka prowadnicy.</p>", "<p>podziałka łańcucha i wysokość ogranicznika zagłębienia.</p>", "<p>liczbę ogniw tnących i wysokość ogranicznika\nzagłębienia.</p>"], "correct": "B", "globalIndex": 9}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-10", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 10, "question": "<p>Którego zasysacza liniowego należy użyć podczas budowy linii\ngaśniczej z odcinków W52 zakończonych wytwornicą pianową WP 2/75, aby\nuzyskać efektywne podawanie piany gaśniczej?</p>", "answers": ["<p>Z 2</p>", "<p>Z 4</p>", "<p>Z 6</p>", "<p>Z 8</p>"], "correct": "A", "globalIndex": 10}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-11", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 11, "question": "<p>Przy jakim ciśnieniu powinien uruchomić się sygnalizator akustyczny w\nnadciśnieniowym powietrznym aparacie butlowym?</p>", "answers": ["<p>3,0 - 4,5 MPa</p>", "<p>5,0 - 6,0 MPa</p>", "<p>6,5 - 7,0 MPa</p>", "<p>7,5 - 8,0 MPa</p>"], "correct": "B", "globalIndex": 11}, {"id": "ms20-2018-maj-egzamin-zawodowy-pisemny-12", "source": "ms20-2018-maj-egzamin-zawodowy-pisemny", "number": 12, "question": "<p>Ciśnienie w przewodzie butlowego powietrznego aparatu\nnadciśnieniowego z manometrem jest</p>", "answers": ["<p>dwa razy większe.</p>", "<p>o połowę mniejsze.</p>", "<p>takie samo jak w butli.</p>", "<p>takie samo jak na zewnątrz.</p>"], "correct": "C", "globalIndex": 12  30, "question": "<p>Minimalna energia zapłonu jest parametrem, który pozwala na ocenę\nzagrożenia wybuchem pochodzącego od istniejących w rozpatrywanym\nobszarze źródeł energii. Dla gazów i palnych par minimalna energia\nzapłonu występuje przy ich stężeniu w mieszaninie z powietrzem na\npoziomie</p>", "answers": ["<p>wyższym niż stężenie stechiometryczne.</p>", "<p>dolnej granicy wybuchowości.</p>", "<p>górnej granicy wybuchowości.</p>", "<p>stężenia stechiometrycznego.</p>"], "correct": "D", "globalIndex": 350}, {"id": "z22-2017-maj-egzamin-zawodowy-pisemny-31", "source": "z22-2017-maj-egzamin-zawodowy-pisemny", "number": 31, "question": "<p>Tablica ostrzegawcza na rysunku informuje o możliwości\nwystąpienia</p>", "answers": ["<p>obłoku pyłu.</p>", "<p>materiałów pirotechnicznych.</p>", "<p>składowanych materiałów wybuchowych.</p>", "<p>mieszaniny z powietrzem substancji palnych w postaci par lub\nmgieł.</p>"], "correct": "D", "globalIndex": 351}, {"id": "z22-2017-maj-egzamin-zawodowy-pisemny-32", "source": "z22-2017-maj-egzamin-zawodowy-pisemny", "number": 32, "question": "<p>Jaką nazwą określane jest zdarzenie wynikające z rozwoju\ncywilizacyjnego i naturalnych praw przyrody, niebędące pożarem ani\nklęską żywiołową, stanowiące zagrożenie dla życia, zdrowia, mienia lub\nśrodowiska, któremu zapobieżenie lub którego usunięcie skutków nie\nwymaga zastosowania nadzwyczajnych środków?</p>", "answers": ["<p>Inne miejscowe zagrożenie.</p>", "<p>Katastrofa naturalna.</p>", "<p>Awaria techniczna.</p>", "<p>Wypadek.</p>"], "correct": "A", "globalIndex": 352}, {"id": "z22-2017-maj-egzamin-zawodowy-pisemny-33", "source": "z22-2017-maj-egzamin-zawodowy-pisemny", "number": 33, "question": "<p>Jak w nomenklaturze pożarniczej określany jest pododdział liczący od\n6 do 12 ratowników, w tym dowódca, wyposażony w 2 samochody\nratowniczo-gaśnicze?</p>", "answers": ["<p>Drużyna.</p>", "<p>Zastęp.</p>", "<p>Sekcja.</p>", "<p>Pluton.</p>"], "correct": "C", "globalIndex": 353}, {"id": " let questions = [], idx = 0, userAnswers = {};
const letters = ['A','B','C','D'];
function cleanSource(s) { return s.replace('-egzamin-zawodowy-pisemny','').toUpperCase().replaceAll('-', ' '); }
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function init() {
 const sums={}; ALL_QUESTIONS.forEach(q=>sums[q.source]=(sums[q.source]||0)+1);
 const ss=document.getElementById('sourceSummary'); const sp=document.getElementById('sourcePick');
 Object.entries(sums).forEach(([src,n])=>{ ss.innerHTML += `<div class="source-card"><b>${cleanSource(src)}</b><br><span class="muted">${n} pytań</span></div>`; sp.innerHTML += `<option value="${src}">${cleanSource(src)} (${n})</option>`; });
 document.getElementById('mode').addEventListener('change', e=>document.getElementById('sourcePickWrap').classList.toggle('hidden', e.target.value!=='source'));
}
function startQuiz() {
 const mode=document.getElementById('mode').value, order=document.getElementById('order').value, source=document.getElementById('sourcePick').value;
 questions=[...ALL_QUESTIONS];
 if(mode==='source') questions=questions.filter(q=>q.source===source);
 if(mode==='random40') questions=shuffle(questions).slice(0,40);
 if(order==='shuffle' && mode!=='random40') questions=shuffle(questions);
 idx=0; userAnswers={};
 document.getElementById('start').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); document.getElementById('quiz').classList.remove('hidden');
 renderQuestion();
}
function renderQuestion() {
 const q=questions[idx];
 document.getElementById('counter').textContent=`Pytanie ${idx+1} z ${questions.length}`;
 document.getElementById('source').textContent=`Arkusz: ${cleanSource(q.source)} | zad. ${q.number}`;
 document.getElementById('question').innerHTML=q.question || '<p><em>Treść pytania nie została odczytana.</em></p>';
 document.getElementById('progress').style.width=((idx)/questions.length*100)+'%';
 const answers=document.getElementById('answers'); answers.innerHTML='';
 q.answers.forEach((ans,i)=>{
   const b=document.createElement('button'); b.className='answer'; b.innerHTML=`<span class="badge">${letters[i]}</span><span>${ans}</span>`; b.onclick=()=>choose(letters[i]); answers.appendChild(b);
 });
 document.getElementById('feedback').className='feedback'; document.getElementById('feedback').textContent='';
 if(userAnswers[q.id]) showChosen();
 document.getElementById('nextBtn').textContent = idx===questions.length-1 ? 'Zakończ test' : 'Następne';
 updateLive();
}
function choose(letter) { if(userAnswers[questions[idx].id]) return; userAnswers[questions[idx].id]=letter; showChosen(); updateLive(); }
function showChosen() {
 const q=questions[idx], chosen=userAnswers[q.id], correct=q.correct;
 document.querySelectorAll('.answer').forEach((b,i)=>{
   const L=letters[i]; b.disabled=true;
   if(L===correct) b.classList.add('correct');
   if(L===chosen && L!==correct) b.classList.add('wrong');
 });
 const fb=document.getElementById('feedback');
 if(chosen===correct) { fb.className='feedback good'; fb.textContent='Dobrze. Poprawna odpowiedź: '+correct; }
 else { fb.className='feedback bad'; fb.textContent='Źle. Poprawna odpowiedź: '+correct; }
}
function updateLive() {
 let answered=Object.keys(userAnswers).length, good=questions.filter(q=>userAnswers[q.id]===q.correct).length;
 document.getElementById('scoreLive').textContent=`Odpowiedzi: ${answered}/${questions.length} | poprawne: ${good}`;
}
function prevQuestion() { if(idx>0){idx--; renderQuestion();} }
function nextQuestion() { if(idx<questions.length-1){idx++; renderQuestion();} else finish(); }
function finish() {
 let good=questions.filter(q=>userAnswers[q.id]===q.correct).length;
 document.getElementById('quiz').classList.add('hidden'); document.getElementById('result').classList.remove('hidden');
 document.getElementById('progress').style.width='100%';
 document.getElementById('resultText').innerHTML=`Uzyskano <b>${good}</b> / <b>${questions.length}</b> pkt (${Math.round(good/questions.length*100)}%).`;
 document.getElementById('review').classList.add('hidden'); document.getElementById('review').innerHTML='';
}
function showReview() {
 const r=document.getElementById('review'); r.classList.remove('hidden'); r.innerHTML='<h2>Przegląd odpowiedzi</h2>';
 questions.forEach((q,i)=>{
   const ua=userAnswers[q.id] || 'brak'; const ok=ua===q.correct;
   r.innerHTML += `<div class="review-item"><div class="small muted">${i+1}. ${cleanSource(q.source)} — zad. ${q.number}</div><div>${q.question}</div><p>Twoja odpowiedź: <b class="${ok?'ok':'no'}">${ua}</b> | Poprawna: <b class="ok">${q.correct}</b></p></div>`;
 });
}
function backToStart() { document.getElementById('quiz').classList.add('hidden'); document.getElementById('result').classList.add('hidden'); document.getElementById('start').classList.remove('hidden'); }
init();
</script>
